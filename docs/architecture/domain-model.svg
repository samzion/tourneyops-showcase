<svg xmlns="http://www.w3.org/2000/svg" width="900" viewBox="0 0 900 860" style="background:#ffffff;font-family:Arial,sans-serif;">

  <!-- ── TITLE ───────────────────────────────────────────────────── -->
  <text x="450" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#1F3A6E">TourneyOps — Domain Model</text>
  <text x="450" y="46" text-anchor="middle" font-size="11" fill="#888">Key entities and relationships (35+ total entities in production)</text>

  <!-- ══════════════════════════════════════════════════════════════ -->
  <!-- IDENTITY LAYER -->
  <!-- ══════════════════════════════════════════════════════════════ -->
  <text x="30" y="75" font-size="10" fill="#aaa" font-style="italic">Identity layer</text>
  <line x1="30" y1="80" x2="870" y2="80" stroke="#ddd" stroke-width="1"/>

  <!-- User -->
  <rect x="360" y="90" width="180" height="54" rx="8" fill="#EEF2F8" stroke="#1F3A6E" stroke-width="1.5"/>
  <text x="450" y="111" text-anchor="middle" font-size="13" font-weight="700" fill="#1F3A6E">User</text>
  <text x="450" y="129" text-anchor="middle" font-size="10" fill="#555">Single account · multi-role</text>

  <!-- UserRole -->
  <rect x="368" y="176" width="164" height="38" rx="6" fill="#F1EFE8" stroke="#888" stroke-width="1"/>
  <text x="450" y="190" text-anchor="middle" font-size="12" font-weight="600" fill="#444">UserRole</text>
  <text x="450" y="206" text-anchor="middle" font-size="10" fill="#666">junction table</text>

  <!-- Role -->
  <rect x="348" y="246" width="204" height="38" rx="6" fill="#F1EFE8" stroke="#888" stroke-width="1"/>
  <text x="450" y="260" text-anchor="middle" font-size="12" font-weight="600" fill="#444">Role</text>
  <text x="450" y="276" text-anchor="middle" font-size="10" fill="#666">PLAYER · COACH · UMPIRE · ORGANISER · CLUB</text>

  <!-- User → UserRole → Role -->
  <line x1="450" y1="144" x2="450" y2="176" stroke="#999" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="450" y1="214" x2="450" y2="246" stroke="#999" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ══════════════════════════════════════════════════════════════ -->
  <!-- PROFILE LAYER -->
  <!-- ══════════════════════════════════════════════════════════════ -->
  <text x="30" y="318" font-size="10" fill="#aaa" font-style="italic">Profile layer</text>
  <line x1="30" y1="323" x2="870" y2="323" stroke="#ddd" stroke-width="1"/>

  <!-- Player -->
  <rect x="30" y="332" width="148" height="54" rx="8" fill="#EDE7F6" stroke="#6A3AB2" stroke-width="1.5"/>
  <text x="104" y="353" text-anchor="middle" font-size="13" font-weight="700" fill="#4A0E8F">Player</text>
  <text x="104" y="371" text-anchor="middle" font-size="10" fill="#555">Height · weight · dominance</text>

  <!-- PlayerSport -->
  <rect x="30" y="418" width="148" height="54" rx="8" fill="#EDE7F6" stroke="#6A3AB2" stroke-width="1.5"/>
  <text x="104" y="439" text-anchor="middle" font-size="13" font-weight="700" fill="#4A0E8F">PlayerSport</text>
  <text x="104" y="457" text-anchor="middle" font-size="10" fill="#555">JSONB sport attrs</text>

  <!-- Coach -->
  <rect x="202" y="332" width="148" height="54" rx="8" fill="#EDE7F6" stroke="#6A3AB2" stroke-width="1.5"/>
  <text x="276" y="353" text-anchor="middle" font-size="13" font-weight="700" fill="#4A0E8F">Coach</text>
  <text x="276" y="371" text-anchor="middle" font-size="10" fill="#555">Expertise · certifications</text>

  <!-- Umpire -->
  <rect x="374" y="332" width="148" height="54" rx="8" fill="#EDE7F6" stroke="#6A3AB2" stroke-width="1.5"/>
  <text x="448" y="353" text-anchor="middle" font-size="13" font-weight="700" fill="#4A0E8F">Umpire</text>
  <text x="448" y="371" text-anchor="middle" font-size="10" fill="#555">Cert level · match history</text>

  <!-- Organiser -->
  <rect x="546" y="332" width="148" height="54" rx="8" fill="#EDE7F6" stroke="#6A3AB2" stroke-width="1.5"/>
  <text x="620" y="353" text-anchor="middle" font-size="13" font-weight="700" fill="#4A0E8F">Organiser</text>
  <text x="620" y="371" text-anchor="middle" font-size="10" fill="#555">Manages seasons</text>

  <!-- Club -->
  <rect x="718" y="332" width="148" height="54" rx="8" fill="#EDE7F6" stroke="#6A3AB2" stroke-width="1.5"/>
  <text x="792" y="353" text-anchor="middle" font-size="13" font-weight="700" fill="#4A0E8F">Club</text>
  <text x="792" y="371" text-anchor="middle" font-size="10" fill="#555">Sports organisation</text>

  <!-- User → profiles (fan out) -->
  <path d="M400 144 Q200 260 104 332" fill="none" stroke="#bbb" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arr)"/>
  <path d="M420 144 Q340 260 276 332" fill="none" stroke="#bbb" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arr)"/>
  <path d="M450 144 L448 332" fill="none" stroke="#bbb" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arr)"/>
  <path d="M480 144 Q560 260 620 332" fill="none" stroke="#bbb" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arr)"/>
  <path d="M500 144 Q680 260 792 332" fill="none" stroke="#bbb" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arr)"/>

  <!-- Player → PlayerSport -->
  <line x1="104" y1="386" x2="104" y2="418" stroke="#6A3AB2" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══════════════════════════════════════════════════════════════ -->
  <!-- TEAM LAYER -->
  <!-- ══════════════════════════════════════════════════════════════ -->
  <text x="30" y="502" font-size="10" fill="#aaa" font-style="italic">Club &amp; team layer</text>
  <line x1="30" y1="507" x2="870" y2="507" stroke="#ddd" stroke-width="1"/>

  <!-- Team -->
  <rect x="718" y="516" width="148" height="54" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
  <text x="792" y="537" text-anchor="middle" font-size="13" font-weight="700" fill="#085041">Team</text>
  <text x="792" y="555" text-anchor="middle" font-size="10" fill="#555">Belongs to club</text>

  <!-- TeamMember -->
  <rect x="718" y="602" width="148" height="54" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
  <text x="792" y="623" text-anchor="middle" font-size="13" font-weight="700" fill="#085041">TeamMember</text>
  <text x="792" y="641" text-anchor="middle" font-size="10" fill="#555">Role · join date · status</text>

  <!-- Club → Team, Team → TeamMember -->
  <line x1="792" y1="386" x2="792" y2="516" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="792" y1="570" x2="792" y2="602" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══════════════════════════════════════════════════════════════ -->
  <!-- TOURNAMENT LAYER -->
  <!-- ══════════════════════════════════════════════════════════════ -->
  <text x="230" y="502" font-size="10" fill="#aaa" font-style="italic">Tournament layer</text>

  <!-- TournamentSeason -->
  <rect x="230" y="516" width="182" height="54" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1.5"/>
  <text x="321" y="537" text-anchor="middle" font-size="13" font-weight="700" fill="#633806">TournamentSeason</text>
  <text x="321" y="555" text-anchor="middle" font-size="10" fill="#555">Format · sport · dates · rules</text>

  <!-- TournamentStage -->
  <rect x="230" y="602" width="182" height="54" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1.5"/>
  <text x="321" y="623" text-anchor="middle" font-size="13" font-weight="700" fill="#633806">TournamentStage</text>
  <text x="321" y="641" text-anchor="middle" font-size="10" fill="#555">Group phase · knockout phase</text>

  <!-- TournamentGroup -->
  <rect x="440" y="602" width="148" height="54" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1.5"/>
  <text x="514" y="623" text-anchor="middle" font-size="13" font-weight="700" fill="#633806">TournamentGroup</text>
  <text x="514" y="641" text-anchor="middle" font-size="10" fill="#555">Within stage</text>

  <!-- Organiser → Season -->
  <path d="M620 386 L620 487 L412 516" fill="none" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Season → Stage, Stage → Group -->
  <line x1="321" y1="570" x2="321" y2="602" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="412" y1="629" x2="440" y2="629" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══════════════════════════════════════════════════════════════ -->
  <!-- MATCH LAYER -->
  <!-- ══════════════════════════════════════════════════════════════ -->
  <text x="30" y="688" font-size="10" fill="#aaa" font-style="italic">Match layer</text>
  <line x1="30" y1="693" x2="870" y2="693" stroke="#ddd" stroke-width="1"/>

  <!-- TournamentMatch -->
  <rect x="200" y="702" width="182" height="54" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1.5"/>
  <text x="291" y="723" text-anchor="middle" font-size="13" font-weight="700" fill="#4A1B0C">TournamentMatch</text>
  <text x="291" y="741" text-anchor="middle" font-size="10" fill="#555">Venue · umpire · status · time</text>

  <!-- MatchEvent -->
  <rect x="410" y="702" width="148" height="54" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1.5"/>
  <text x="484" y="723" text-anchor="middle" font-size="13" font-weight="700" fill="#4A1B0C">MatchEvent</text>
  <text x="484" y="741" text-anchor="middle" font-size="10" fill="#555">Goals · cards · points · sets</text>

  <!-- Venue ref -->
  <rect x="30" y="702" width="148" height="54" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1.5"/>
  <text x="104" y="723" text-anchor="middle" font-size="13" font-weight="700" fill="#4A1B0C">Venue</text>
  <text x="104" y="741" text-anchor="middle" font-size="10" fill="#555">GPS · availability</text>

  <!-- TournamentParticipant -->
  <rect x="580" y="702" width="170" height="54" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1.5"/>
  <text x="665" y="723" text-anchor="middle" font-size="13" font-weight="700" fill="#4A1B0C">Participant</text>
  <text x="665" y="741" text-anchor="middle" font-size="10" fill="#555">Registered to season</text>

  <!-- Stage → Match -->
  <path d="M321 656 L321 679 L291 679 L291 702" fill="none" stroke="#993C1D" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Match → Event -->
  <line x1="382" y1="729" x2="410" y2="729" stroke="#993C1D" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Venue → Match -->
  <line x1="178" y1="729" x2="200" y2="729" stroke="#993C1D" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Season → Participant -->
  <path d="M412 543 L665 543 L665 702" fill="none" stroke="#bbb" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arr)"/>

  <!-- ── ARROW MARKER DEF ─────────────────────────────────────────── -->
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ── LEGEND ─────────────────────────────────────────────────── -->
  <rect x="30" y="786" width="840" height="52" rx="8" fill="none" stroke="#ddd" stroke-width="1"/>
  <line x1="50" y1="820" x2="90" y2="820" stroke="#999" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="98" y="820" font-size="10" fill="#666" dominant-baseline="central">Direct relationship</text>
  <line x1="220" y1="820" x2="260" y2="820" stroke="#bbb" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arr)"/>
  <text x="268" y="820" font-size="10" fill="#666" dominant-baseline="central">Indirect / optional association</text>
  <rect x="450" y="810" width="12" height="12" rx="2" fill="#EDE7F6" stroke="#6A3AB2" stroke-width="1"/>
  <text x="468" y="820" font-size="10" fill="#666" dominant-baseline="central">Profile entities (role-additive — user can hold multiple roles)</text>
  <text x="50" y="800" font-size="10" fill="#666" dominant-baseline="central">JSONB = sport-specific player attributes stored flexibly — no schema migration required when a new sport is added</text>

</svg>
