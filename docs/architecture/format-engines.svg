<svg xmlns="http://www.w3.org/2000/svg" width="900" viewBox="0 0 900 580" style="background:#ffffff;font-family:Arial,sans-serif;">

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ── TITLE ───────────────────────────────────────────────────── -->
  <text x="450" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#1F3A6E">TourneyOps — Tournament Format Engine Hierarchy</text>
  <text x="450" y="46" text-anchor="middle" font-size="11" fill="#888">Each engine implements a common interface and handles bracket logic for its specific format</text>

  <!-- ══════════════════════════════════════════════════════════════ -->
  <!-- INTERFACE — top centre -->
  <!-- ══════════════════════════════════════════════════════════════ -->
  <rect x="280" y="68" width="340" height="62" rx="10" fill="#EEF2F8" stroke="#1F3A6E" stroke-width="2"/>
  <text x="450" y="88" text-anchor="middle" font-size="11" fill="#999">«interface»</text>
  <text x="450" y="106" text-anchor="middle" font-size="14" font-weight="700" fill="#1F3A6E">TournamentOrchestratorEngine</text>
  <text x="450" y="122" text-anchor="middle" font-size="10" fill="#555">validate() · generateFixtures() · advanceRound() · isComplete()</text>

  <!-- Trunk line down from interface -->
  <line x1="450" y1="130" x2="450" y2="168" stroke="#1F3A6E" stroke-width="1.5"/>
  <!-- Horizontal bar -->
  <line x1="70" y1="168" x2="830" y2="168" stroke="#1F3A6E" stroke-width="1.5"/>

  <!-- ══════════════════════════════════════════════════════════════ -->
  <!-- 7 ENGINE BOXES + drop lines -->
  <!-- Engine spacing: 7 boxes across 900px. Box width=102, gap=12 -->
  <!-- x positions: 30, 144, 258, 372, 486, 600, 714             -->
  <!-- ══════════════════════════════════════════════════════════════ -->

  <!-- Drop lines from bar to each box -->
  <line x1="81"  y1="168" x2="81"  y2="198" stroke="#1F3A6E" stroke-width="1"/>
  <line x1="195" y1="168" x2="195" y2="198" stroke="#1F3A6E" stroke-width="1"/>
  <line x1="309" y1="168" x2="309" y2="198" stroke="#1F3A6E" stroke-width="1"/>
  <line x1="423" y1="168" x2="423" y2="198" stroke="#1F3A6E" stroke-width="1"/>
  <line x1="537" y1="168" x2="537" y2="198" stroke="#1F3A6E" stroke-width="1"/>
  <line x1="651" y1="168" x2="651" y2="198" stroke="#1F3A6E" stroke-width="1"/>
  <line x1="765" y1="168" x2="765" y2="198" stroke="#1F3A6E" stroke-width="1"/>

  <!-- ── 1. League ────────────────────────────────────────────────── -->
  <rect x="30" y="198" width="102" height="72" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1.5"/>
  <text x="81" y="218" text-anchor="middle" font-size="12" font-weight="700" fill="#633806">League</text>
  <text x="81" y="233" text-anchor="middle" font-size="9" fill="#7a4a10">Round-robin</text>
  <text x="81" y="246" text-anchor="middle" font-size="9" fill="#7a4a10">fixture generation</text>
  <text x="81" y="259" text-anchor="middle" font-size="9" fill="#7a4a10">+ tiebreaker rules</text>

  <!-- ── 2. Knockout ─────────────────────────────────────────────── -->
  <rect x="144" y="198" width="102" height="72" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1.5"/>
  <text x="195" y="218" text-anchor="middle" font-size="12" font-weight="700" fill="#633806">Knockout</text>
  <text x="195" y="233" text-anchor="middle" font-size="9" fill="#7a4a10">Single-elimination</text>
  <text x="195" y="246" text-anchor="middle" font-size="9" fill="#7a4a10">seeding support</text>
  <text x="195" y="259" text-anchor="middle" font-size="9" fill="#7a4a10">+ bye handling</text>

  <!-- ── 3. Group-to-Knockout ────────────────────────────────────── -->
  <rect x="258" y="198" width="102" height="72" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1.5"/>
  <text x="309" y="218" text-anchor="middle" font-size="12" font-weight="700" fill="#633806">Group-KO</text>
  <text x="309" y="233" text-anchor="middle" font-size="9" fill="#7a4a10">Group phase feeds</text>
  <text x="309" y="246" text-anchor="middle" font-size="9" fill="#7a4a10">knockout rounds</text>
  <text x="309" y="259" text-anchor="middle" font-size="9" fill="#7a4a10">+ qual. criteria</text>

  <!-- ── 4. Challenger Rotation ─────────────────────────────────── -->
  <rect x="372" y="198" width="102" height="72" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1.5"/>
  <text x="423" y="218" text-anchor="middle" font-size="12" font-weight="700" fill="#633806">Challenger</text>
  <text x="423" y="233" text-anchor="middle" font-size="9" fill="#7a4a10">Rotating challenger</text>
  <text x="423" y="246" text-anchor="middle" font-size="9" fill="#7a4a10">continuous play</text>
  <text x="423" y="259" text-anchor="middle" font-size="9" fill="#7a4a10">format</text>

  <!-- ── 5. Double Elimination ──────────────────────────────────── -->
  <rect x="486" y="198" width="102" height="72" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1.5"/>
  <text x="537" y="218" text-anchor="middle" font-size="12" font-weight="700" fill="#633806">Double Elim</text>
  <text x="537" y="233" text-anchor="middle" font-size="9" fill="#7a4a10">Winner + loser</text>
  <text x="537" y="246" text-anchor="middle" font-size="9" fill="#7a4a10">bracket management</text>
  <text x="537" y="259" text-anchor="middle" font-size="9" fill="#7a4a10">+ finals routing</text>

  <!-- ── 6. Fixed Matches with Bye Recovery ──────────────────────── -->
  <rect x="600" y="198" width="102" height="72" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1.5"/>
  <text x="651" y="218" text-anchor="middle" font-size="12" font-weight="700" fill="#633806">Fixed+Bye</text>
  <text x="651" y="233" text-anchor="middle" font-size="9" fill="#7a4a10">Pre-set fixtures</text>
  <text x="651" y="246" text-anchor="middle" font-size="9" fill="#7a4a10">automatic bye</text>
  <text x="651" y="259" text-anchor="middle" font-size="9" fill="#7a4a10">recovery logic</text>

  <!-- ── 7. Gauntlet Staircase ──────────────────────────────────── -->
  <rect x="714" y="198" width="102" height="72" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1.5"/>
  <text x="765" y="218" text-anchor="middle" font-size="12" font-weight="700" fill="#633806">Gauntlet</text>
  <text x="765" y="233" text-anchor="middle" font-size="9" fill="#7a4a10">Progressive diff.</text>
  <text x="765" y="246" text-anchor="middle" font-size="9" fill="#7a4a10">staircase with</text>
  <text x="765" y="259" text-anchor="middle" font-size="9" fill="#7a4a10">configurable rules</text>

  <!-- ══════════════════════════════════════════════════════════════ -->
  <!-- SHARED RESPONSIBILITIES BOX -->
  <!-- ══════════════════════════════════════════════════════════════ -->
  <text x="450" y="306" text-anchor="middle" font-size="10" fill="#aaa" font-style="italic">Every engine is responsible for:</text>

  <!-- 4 responsibility cards in a row -->
  <rect x="30" y="318" width="190" height="58" rx="8" fill="#EEF2F8" stroke="#1F3A6E" stroke-width="1"/>
  <text x="125" y="338" text-anchor="middle" font-size="11" font-weight="600" fill="#1F3A6E">1. Validation</text>
  <text x="125" y="353" text-anchor="middle" font-size="9" fill="#555">Confirm config is valid</text>
  <text x="125" y="366" text-anchor="middle" font-size="9" fill="#555">for this format</text>

  <rect x="240" y="318" width="190" height="58" rx="8" fill="#EEF2F8" stroke="#1F3A6E" stroke-width="1"/>
  <text x="335" y="338" text-anchor="middle" font-size="11" font-weight="600" fill="#1F3A6E">2. Fixture generation</text>
  <text x="335" y="353" text-anchor="middle" font-size="9" fill="#555">Initial bracket or schedule</text>
  <text x="335" y="366" text-anchor="middle" font-size="9" fill="#555">based on participants</text>

  <rect x="450" y="318" width="190" height="58" rx="8" fill="#EEF2F8" stroke="#1F3A6E" stroke-width="1"/>
  <text x="545" y="338" text-anchor="middle" font-size="11" font-weight="600" fill="#1F3A6E">3. Round progression</text>
  <text x="545" y="353" text-anchor="middle" font-size="9" fill="#555">Advance participants based</text>
  <text x="545" y="366" text-anchor="middle" font-size="9" fill="#555">on results + format rules</text>

  <rect x="660" y="318" width="210" height="58" rx="8" fill="#EEF2F8" stroke="#1F3A6E" stroke-width="1"/>
  <text x="765" y="338" text-anchor="middle" font-size="11" font-weight="600" fill="#1F3A6E">4. Edge cases</text>
  <text x="765" y="353" text-anchor="middle" font-size="9" fill="#555">Byes · walkovers · ties</text>
  <text x="765" y="366" text-anchor="middle" font-size="9" fill="#555">disqualifications</text>

  <!-- ══════════════════════════════════════════════════════════════ -->
  <!-- KEY DESIGN DECISION NOTE -->
  <!-- ══════════════════════════════════════════════════════════════ -->
  <rect x="30" y="406" width="840" height="74" rx="10" fill="#EAF3DE" stroke="#3B6D11" stroke-width="1.5"/>
  <text x="450" y="426" text-anchor="middle" font-size="12" font-weight="700" fill="#27500A">Key design decision: common interface, 7 concrete implementations</text>
  <text x="450" y="444" text-anchor="middle" font-size="10" fill="#3B6D11">Adding a new format requires implementing the interface only — no changes to the orchestration layer, scheduling system, or match</text>
  <text x="450" y="460" text-anchor="middle" font-size="10" fill="#3B6D11">result processing. Each engine is independently testable and deployable. Format diversity is a configuration choice, not a code branch.</text>

  <!-- ══════════════════════════════════════════════════════════════ -->
  <!-- SPORT SUPPORT NOTE -->
  <!-- ══════════════════════════════════════════════════════════════ -->
  <rect x="30" y="506" width="400" height="54" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1.5"/>
  <text x="230" y="524" text-anchor="middle" font-size="11" font-weight="700" fill="#4A1B0C">Sports currently supported</text>
  <text x="230" y="541" text-anchor="middle" font-size="10" fill="#555">Football — goals, assists, own goals, cards, stoppage time</text>
  <text x="230" y="556" text-anchor="middle" font-size="10" fill="#555">Table Tennis — points per set, set scores, match format</text>

  <rect x="450" y="506" width="420" height="54" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1.5"/>
  <text x="660" y="524" text-anchor="middle" font-size="11" font-weight="700" fill="#4A1B0C">Architecture for new sports</text>
  <text x="660" y="541" text-anchor="middle" font-size="10" fill="#555">Sport-specific score parsers (FootballScoreDataParser,</text>
  <text x="660" y="556" text-anchor="middle" font-size="10" fill="#555">TableTennisScoreDataParser) — new sport = new parser class</text>

</svg>
